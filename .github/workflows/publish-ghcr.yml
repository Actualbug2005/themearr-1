name: Release On Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine bump and next version
        id: semver
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          if [[ -z "${latest_tag}" ]]; then
            latest_tag="v0.0.0"
          fi

          range=""
          if [[ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            range="${{ github.event.before }}..${{ github.sha }}"
          fi

          commit_messages=""
          if [[ -n "${range}" ]]; then
            commit_messages="$(git log --format=%s "${range}")"
          else
            commit_messages="$(git log --format=%s -n 1 "${{ github.sha }}")"
          fi

          bump="patch"
          if echo "${commit_messages}" | grep -Eqi '(^major:)|(#major)|BREAKING CHANGE|!:'; then
            bump="major"
          elif echo "${commit_messages}" | grep -Eqi '(^minor:)|(^feat(\(.+\))?:)|(#minor)'; then
            bump="minor"
          fi

          current="${latest_tag#v}"
          IFS='.' read -r major minor patch <<< "${current}"

          case "${bump}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            *)
              patch=$((patch + 1))
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "bump=${bump}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.next_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          name: ${{ steps.semver.outputs.next_tag }}
          body: |
            Auto-generated release for `${{ github.sha }}`.

            Version bump: `${{ steps.semver.outputs.bump }}`
            Previous tag: `${{ steps.semver.outputs.latest_tag }}`

      - name: Summary
        run: |
          echo "Created release ${{ steps.semver.outputs.next_tag }}"
